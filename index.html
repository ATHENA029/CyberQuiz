<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberQuiz — Security Awareness Training</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.6/dist/amazon-cognito-identity.min.js"></script>
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2a36;
    --accent: #00e5ff;
    --accent2: #ff3e6c;
    --text: #c9d8e8;
    --text-dim: #4a6070;
    --green: #00ff9d;
    --font-mono: 'Share Tech Mono', monospace;
    --font-main: 'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.1) 2px,
      rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .container {
    width: 100%;
    max-width: 440px;
    padding: 20px;
    position: relative;
    z-index: 10;
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    position: relative;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 12px var(--accent));
  }

  .logo h1 {
    font-family: var(--font-mono);
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .logo p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    font-family: var(--font-mono);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanH 3s ease-in-out infinite;
  }

  @keyframes scanH {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    text-transform: uppercase;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .btn:hover {
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }

  .btn:hover::before {
    transform: translateX(0);
  }

  .message {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    display: none;
  }

  .message.error {
    background: rgba(255,62,108,0.1);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    display: block;
  }

  .message.success {
    background: rgba(0,255,157,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    display: block;
  }

  .verify-section { display: none; }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4L8 16V32C8 44.8 18.4 56.8 32 60C45.6 56.8 56 44.8 56 32V16L32 4Z" stroke="#00e5ff" stroke-width="2" fill="rgba(0,229,255,0.05)"/>
        <path d="M24 32L29 37L40 26" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="32" cy="32" r="8" stroke="rgba(0,229,255,0.3)" stroke-width="1" stroke-dasharray="3 3"/>
      </svg>
    </div>
    <h1>CYBERQUIZ</h1>
    <p>Security Awareness Training</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="user@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••••" />
      </div>
      <button class="btn" onclick="login()">Authenticate →</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="user@example.com" />
      </div>
      <div class="form-group">
        <label>Password (min 8 characters)</label>
        <input type="password" id="regPassword" placeholder="••••••••••" />
      </div>
      <button class="btn" onclick="register()">Create Account →</button>
      <div id="registerMessage" class="message"></div>

      <!-- Verify Section -->
      <div class="verify-section" id="verifySection">
        <div class="form-group" style="margin-top:20px">
          <label>Verification Code (check your email)</label>
          <input type="text" id="verifyCode" placeholder="123456" />
        </div>
        <button class="btn" onclick="verify()">Verify Account →</button>
        <div id="verifyMessage" class="message"></div>
      </div>
    </div>
  </div>

  <div class="footer-text">MS5118 Cloud Computing · University of Galway</div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const USER_POOL_ID = 'eu-north-1_Z2GiJJhKv';
  const CLIENT_ID    = '3oiej4mjvfgd1e8btno2naub16';
  // ────────────────────────────────────────────────────────

  const poolData = { UserPoolId: USER_POOL_ID, ClientId: CLIENT_ID };
  const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'message ' + type;
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showMsg('loginMessage', 'Please fill in all fields', 'error');

    const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({ Username: email, Password: password });
    const cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });

    cognitoUser.authenticateUser(authDetails, {
      onSuccess: (result) => {
        const token = result.getIdToken().getJwtToken();
        localStorage.setItem('cyberquiz_token', token);
        localStorage.setItem('cyberquiz_user', email);
        window.location.href = 'dashboard.html';
      },
      onFailure: (err) => showMsg('loginMessage', err.message || 'Login failed', 'error')
    });
  }

  function register() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!email || !password) return showMsg('registerMessage', 'Please fill in all fields', 'error');

    const attrs = [new AmazonCognitoIdentity.CognitoUserAttribute({ Name: 'email', Value: email })];

    userPool.signUp(email, password, attrs, null, (err, result) => {
      if (err) return showMsg('registerMessage', err.message || 'Registration failed', 'error');
      showMsg('registerMessage', 'Account created! Check your email for verification code.', 'success');
      document.getElementById('verifySection').style.display = 'block';
      localStorage.setItem('cyberquiz_pending_user', email);
    });
  }

  function verify() {
    const email = localStorage.getItem('cyberquiz_pending_user');
    const code = document.getElementById('verifyCode').value.trim();
    if (!code) return showMsg('verifyMessage', 'Please enter the verification code', 'error');

    const cognitoUser = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });
    cognitoUser.confirmRegistration(code, true, (err, result) => {
      if (err) return showMsg('verifyMessage', err.message || 'Verification failed', 'error');
      showMsg('verifyMessage', 'Account verified! You can now login.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    });
  }

  // Particles
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = Math.random() * 0.5;
    document.body.appendChild(p);
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('loginForm').style.display !== 'none';
      if (loginVisible) login(); else register();
    }
  });
</script>
</body>
</html>
